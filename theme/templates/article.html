{% extends "base.html" %}
{% block title %}{{ article.title|striptags }}{% endblock %}
{% block content %}
<section id="content" class="body max-w-3xl mx-auto py-12">
  <article>
    <header class="article text-center mb-12">
      <h1 class="entry-title text-4xl md:text-5xl font-sans font-bold text-gray-900 mb-4">
        <a href="{{ SITEURL }}/{{ article.url }}" rel="bookmark" title="Permalink to {{ article.title|striptags }}">{{ article.title }}</a>
      </h1>
      <time class="text-gray-500 font-sans tracking-wide">
        {{ article.date|strftime('%B %d, %Y') }}
      </time>
      <hr class="border-t-4 border-brand-gray mt-8 mb-8 w-24 mx-auto">
    </header>

    <div class="entry-content prose prose-lg prose-red max-w-none text-gray-800 leading-relaxed">
      {{ article.content }}
    </div><!-- /.entry-content -->
    
    <hr class="my-12 border-t border-gray-200">
    <div class="text-center">
      <em class="text-gray-500 italic">Tweet comments, corrections, or props to <a href="https://twitter.com/albertoconnor" class="text-brand-red hover:text-brand-gray transition-colors">@albertoconnor</a></em>
    </div>
  </article>
</section>
{% endblock %}
